<main class="game-board">
  
  <section class="corner-zone top-left">
    <app-player-card [player]="mike"></app-player-card>
  </section>

  <section class="corner-zone top-right">
    <app-player-card [player]="greg"></app-player-card>
  </section>

  <section class="center-console-zone">
    <h1>Game Selection</h1>
    <div class="placeholder-box">
      <p>Select a game to begin the roll-off...</p>
    </div>
  </section>

  <section class="corner-zone bottom-left">
    <app-player-card [player]="jason"></app-player-card>
  </section>

  <section class="corner-zone bottom-right tools-zone">
    <h2>Quick Tools</h2>
    <button (click)="testSimulateGame()">Simulate Game</button>
  </section>

  <app-dookie-dab-modal 
    *ngIf="activeVictim" 
    [victim]="activeVictim!"
    (acknowledge)="dismissDookieModal()">
  </app-dookie-dab-modal>

</main>
